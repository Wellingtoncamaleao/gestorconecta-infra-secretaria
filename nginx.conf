server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.html index.php;

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Bloquear config.php
    location ~ config\.php$ {
        deny all;
    }

    # Bloquear arquivos ocultos
    location ~ /\. {
        deny all;
    }

    # Bloquear cron/ de acesso externo
    location /cron/ {
        deny all;
    }

    # PHP — /api/ e /painel/
    location ~ ^/(api|painel)/.+\.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    # Painel — index.php como default
    location /painel/ {
        try_files $uri /painel/index.php;
    }

    # Qualquer outra coisa
    location / {
        try_files $uri $uri/ =404;
    }
}
