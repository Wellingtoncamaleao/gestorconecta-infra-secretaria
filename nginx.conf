server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php;

    # API endpoints (PHP)
    location /api/ {
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 60s;
        }
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Bloquear config.php
    location ~ config\.php$ {
        deny all;
    }

    # Bloquear arquivos ocultos
    location ~ /\. {
        deny all;
    }

    # Bloquear cron/ de acesso externo
    location /cron/ {
        deny all;
    }
}
